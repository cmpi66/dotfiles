# keybinds

# $term = kitty
$term = foot
$menu = rofi -show run -theme spotlight-menu-center.rasi
$clip = cliphist list | rofi -dmenu -i -theme clipboard.rasi | cliphist decode | wl-copy
# $browser = librewolf
$browser = qutebrowser
# $top = kitty --title btop --class btop btop
$top = $term --title btop --app-id btop -e btop
$pauseall = mpc pause; pauseallmpv
$notifycmd = notify-send -h string:x-canonical-private-synchronous:hypr-cfg -u low
$screenshot = hyprshot -m output -m active
$ipc = qs -c noctalia-shell ipc call

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# bar
# bind = $mainMod, B, exec, killall -SIGUSR1 waybar # Hide waybar
# bind = $mainMod SHIFT, B, exec, pkill -x waybar && hyprctl dispatch exec waybar # the real way to reload waybar

bind = $mainMod, B, exec, $ipc bar toggle
bind = $mainMod SHIFT, B, exec, pkill -x qs && qs -c noctalia-shell # qs doesnt work with hyprctl dispactch like waybar, slower to reload too. And exec isnt needed either to relaunch it

# programs
bind = $mainMod, d, exec, $menu
bind = $mainMod SHIFT, s, exec, passmenu
bind = $mainMod, Return, exec, $term
bind = $mainMod SHIFT, Return, exec,  newt-foot
bind = $mainMod, e, exec, $term --title neomutt -e neomutt
bind = $mainMod SHIFT, e, exec, $term --title newsboat -e newsboat
bind = $mainMod, w, exec, $browser
bind = $mainMod SHIFT, w, exec, choose-sess-foot
bind = $mainMod, r, exec, current-reads
bind = $mainMod SHIFT, r, exec, openpdf
bind = $mainMod, n, exec, $top
bind = $mainMod, a, exec, $term abook
bind = $mainMod, m, exec, $term --app-id Music ncmpcpp
bind = $mainMod, y, exec, lazymouse
bind= $mainMod SHIFT, y, exec, $term --app-id Wiremix wiremix
bind = $mainMod, t, exec, torwrap
bind= $mainMod SHIFT, t, exec, td-toggle

bind= CTRL, semicolon, exec, moveleft
bind= CTRL, apostrophe, exec, moveright

# system
bind = $mainMod SHIFT, d, exec, system-utils-script
bind = $mainMod, c, exec, $clip 
bind = $mainMod, q, killactive,
bind = $mainMod SHIFT, x, exit,
bind = $mainMod SHIFT, Space, workspaceopt, allfloat
bind = $mainMod SHIFT, Space, exec, $notifycmd 'Toggled All Float Mode'
bind = $mainMod, backspace, exec, sysact
bind = $mainMod SHIFT, backspace, exec, hyprlock
bind = ALT, r , exec, hyprctl reload

#screenshots and recording
bind = , Print, exec, $screenshot 
bind = $mainMod, s, exec, select-screen

# MUSIC
bind = $mainMod, bracketleft, exec, mpc seek -10 
bind = $mainMod SHIFT, bracketleft, exec, mpc seek -60 
bind = $mainMod, bracketright, exec, mpc seek -10 
bind = $mainMod SHIFT, bracketright, exec, mpc seek -60 
bind = $mainMod, comma, exec, mpc prev  
bind = $mainMod, period, exec, mpc next  
bind = $mainMod SHIFT, equal, exec, mpc volume +5  
bind = $mainMod SHIFT, minus, exec, mpc volume -5  
bind = $mainMod, v, exec, mpc toggle 
bind = $mainMod SHIFT, v, exec, $pauseall
bind = $mainMod, equal, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+ && notify-send "Vol +" "$(wpctl get-volume @DEFAULT_AUDIO_SINK@)"
bind = $mainMod, minus, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%- && notify-send "Vol -" "$(wpctl get-volume @DEFAULT_AUDIO_SINK@)"


# Move focus with mainMod + vim keys
bind= $mainMod, j, layoutmsg, cyclenext
bind= $mainMod, k, layoutmsg, cycleprev
bind= $mainMod SHIFT, k, layoutmsg, swapprev
bind= $mainMod SHIFT, j, layoutmsg, swapnext
bind= $mainMod, space, layoutmsg, swapwithmaster
bindd = $mainMod, u, Toggle workspace layout, exec, hyprland-workspace-layout-toggle

# monocle and fullscreen
# bind= $mainMod, u, fullscreen, 1 # welp, no longer needed anymore since real monocle is available and i got the omarchy keybind
bind= $mainMod, f, fullscreen, 0

# groups
bind = $mainMod, g, togglegroup
bind = $mainMod SHIFT, g, moveoutofgroup
bind = ALT, H, changegroupactive, b
bind = ALT, L, changegroupactive, f
bind = ALT SHIFT, h, movegroupwindow, b # these are to swap the group tabs themselves
bind = ALT SHIFT, l, movegroupwindow, f
bind = $mainMod, i, lockactivegroup, toggle
bind = $mainMod SHIFT, h, movewindoworgroup, l
bind = $mainMod SHIFT, l, movewindoworgroup, r

# move workspaces removing since using groups and not really used anymore
# bind = $mainMod, semicolon, workspace, e+1
# bind = $mainMod, g, workspace, e-1

# resize workspace
bind = $mainMod, h,  resizeactive, -20 0
bind = $mainMod, l,  resizeactive, 20 0

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# moniotrs 
bind = $mainMod SHIFT, p, movewindow, mon:DP-1
bind = $mainMod SHIFT, o, movewindow, mon:DP-2
bind = $mainMod, o, focusmonitor, DP-2
bind = $mainMod, p, focusmonitor, DP-1


# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10


# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod SHIFT, mouse:272, resizewindow
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
