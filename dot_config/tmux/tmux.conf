tmux_dir="~/.config/tmux"
tmux_plugins_dir="$tmux_dir/plugins"

# keybinds
set -g prefix C-Space
set -g prefix2 C-b
bind C-Space send-prefix

bind-key r run-shell " \
			tmux source-file ~/.config/tmux/tmux.conf > /dev/null; \
			tmux display-message 'Sourced tmux_config!'"

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

bind-key c kill-window
bind-key w new-window
bind-key x kill-pane
bind-key W choose-window
bind-key T clock-mode

# its funny -h is vertical split and -v is horizontal. Makes no sense.
bind v split-window -h -c "#{pane_current_path}"
bind H split-window -v -c "#{pane_current_path}"
bind k kill-pane -a                  # Kill all panes except for the current one

# vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Easier and faster switching between next/prev window
bind -n C-p previous-window
bind -n C-n next-window

# opts
set-option -g detach-on-destroy off
setw -q -g utf8 on
set -g mouse on
set -g renumber-windows on
set -g set-titles on
set -sg repeat-time 500
set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",foot:Tc"
set -s escape-time 0
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 1
set -g focus-events on
setw -g aggressive-resize on
set -g base-index 1
setw -g pane-base-index 1
set -g visual-activity off
set -g set-clipboard on
set -g allow-passthrough on
# update so i can change wallpapers with imv when launched through yazi
set-option -g update-environment "WAYLAND_DISPLAY HYPRLAND_INSTANCE_SIGNATURE XDG_RUNTIME_DIR DISPLAY"


# Status bar
set -g status on
set -g status-justify centre
set -g status-position top
set -g status-interval 5
set -g status-left-length 90
set -g status-right-length 90
set -g status-style "bg=default"

set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7dc4e4"
set -g message-style "bg=default,fg=#7dc4e4"
set -g message-command-style "bg=default,fg=#7dc4e4"
set -g mode-style "bg=#7dc4e4,fg=black"
set -g window-status-separator ""
set -gw automatic-rename on
setw -g window-status-format "#[fg=brightblack,noitalics] #I:#W "
setw -g window-status-current-format "#[fg=#7dc4e4,bold,noitalics] #I:#W "

set -g status-left "#[bg=default,fg=#7dc4e4,bold] #S #[bg=default]  #[fg=green,bold]#{?pane_in_mode,COPY ,}#[fg=red,bold]#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}"
# Right: hostname (omarchy style)
set -g status-right "#[fg=brightblack,bold]#h "

# plugins
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$tmux_plugins_dir"

set -g @plugin 'tmux-plugins/tpm'                   # Plugin Manager
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'omerxx/tmux-floax'

set -g @floax-bind '-n M-y'
set -g @floax-bind-menu 'P'
set -g @floax-width '50%'
set -g @floax-height '50%'
set -g @floax-change-path 'true'
set -g @floax-session-name 'floax'
set -g @floax-title 'floax'

if "test ! -d ~/.config/tmux/plugins/vim-tmux-navigator/" \
   "run '~/.config/tmux/plugins/tpm/bin/install_plugins'"

# Run the plugins
run "$tmux_plugins_dir/tpm/tpm"
