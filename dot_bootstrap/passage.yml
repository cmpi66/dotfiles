- name: Machine setup
  hosts: localhost
  become: true
  connection: local
  gather_facts: true

  tasks:
    - name: Create required directories
      become: false
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /home/chris/dl/git-clones
        - /home/chris/.local/share/repos

    - name: Clone passage
      become: false
      ansible.builtin.git:
        repo: "https://github.com/FiloSottile/passage.git"
        dest: "/home/chris/dl/git-clones/passage"
        update: no

    - name: Install passage
      shell: make install
      args:
        chdir: /home/chris/dl/git-clones/passage/
        creates: /usr/bin/passage
