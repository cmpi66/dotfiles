- name: Machine setup
  hosts: localhost
  become: true
  connection: local
  gather_facts: true

  pre_tasks:
    # ---------- PACMAN / KEYRING BOOTSTRAP ----------
    - name: Ensure Artix + Arch keyring packages are installed
      pacman:
        name:
          - artix-keyring
          - artix-archlinux-support
        state: present

    - name: Ensure [extra] repo block exists
      blockinfile:
        path: /etc/pacman.conf
        marker: "# {mark} ANSIBLE MANAGED EXTRA REPO"
        block: |
          [extra]
          Include = /etc/pacman.d/mirrorlist-arch

    - name: Check if pacman keyring is initialized
      stat:
        path: /etc/pacman.d/gnupg/pubring.kbx
      register: keyring_initialized

    - name: Initialize pacman keyring (first-time only)
      command: pacman-key --init
      when: not keyring_initialized.stat.exists

    - name: Populate Artix keyring
      command: pacman-key --populate artix
      when: not keyring_initialized.stat.exists

    - name: Populate Arch keyring
      command: pacman-key --populate archlinux
      when: not keyring_initialized.stat.exists

    # ---------- CHAOTIC AUR ----------
    - name: Check if Chaotic AUR key is already trusted
      command: pacman-key --list-keys 3056513887B78AEB
      register: chaotic_key_check
      changed_when: false
      failed_when: false

    - name: Import Chaotic AUR key (if missing)
      command: pacman-key --recv-key 3056513887B78AEB --keyserver keyserver.ubuntu.com
      when: chaotic_key_check.rc != 0

    - name: Locally sign Chaotic AUR key (if missing)
      command: pacman-key --lsign-key 3056513887B78AEB
      when: chaotic_key_check.rc != 0

    - name: Check if chaotic-keyring is installed
      command: pacman -Q chaotic-keyring
      register: chaotic_keyring_installed
      changed_when: false
      failed_when: false

    - name: Install chaotic-keyring
      command: pacman -U --noconfirm https://cdn-mirror.chaotic.cx/chaotic-aur/chaotic-keyring.pkg.tar.zst
      when: chaotic_keyring_installed.rc != 0

    - name: Check if chaotic-mirrorlist is installed
      command: pacman -Q chaotic-mirrorlist
      register: chaotic_mirrorlist_installed
      changed_when: false
      failed_when: false

    - name: Install chaotic-mirrorlist
      command: pacman -U --noconfirm https://cdn-mirror.chaotic.cx/chaotic-aur/chaotic-mirrorlist.pkg.tar.zst
      when: chaotic_mirrorlist_installed.rc != 0

    - name: Ensure [chaotic-aur] repo exists
      blockinfile:
        path: /etc/pacman.conf
        marker: "# {mark} ANSIBLE MANAGED CHAOTIC AUR"
        block: |
          [chaotic-aur]
          Include = /etc/pacman.d/chaotic-mirrorlist

    - name: Full system upgrade
      pacman:
        update_cache: true
        upgrade: yes

  tasks:
    - name: Get my user
      become: false
      ansible.builtin.set_fact:
        remote_regular_user: "{{ ansible_env.SUDO_USER or ansible_user_id }}"

    - name: Change shell to zsh
      ansible.builtin.user:
        name: "{{ remote_regular_user }}"
        shell: /usr/bin/zsh

    - name: source zdotdir system wide
      lineinfile:
        path: /etc/zsh/zshenv
        line: "export ZDOTDIR=$HOME/.config/zsh"
        create: yes

    - name: Doas conf
      lineinfile:
        path: /etc/doas.conf
        line: "permit nopass :wheel"
        create: yes

    - name: Install packages
      pacman:
        name:
          - 7zip
          - aerc
          - arch-wiki-docs
          - argyllcms
          - artix-archlinux-support
          - anki
          - bind
          - bluez
          - bluez-openrc
          - bluez-utils
          - brightnessctl
          - chafa
          - cliphist
          - cmake
          - ctags
          - curl
          - dmidecode
          - dosfstools
          - entr
          - ffmpeg
          - foot
          - foot-terminfo
          - fuse3
          - gammastep
          - gimp
          - gimp-plugin-gmic
          - gnome-keyring
          - go
          - grim
          - hypridle
          - hyprland
          - hyprlock
          - hyprpaper
          - hyprpicker
          - hyprshot
          - kguiaddons
          - kitty
          - kwayland5
          - libappindicator
          - libdbusmenu-glib
          - libdbusmenu-gtk3
          - linux-zen
          - linux-zen-headers
          - lshw
          - lsof
          - lynx
          - mako
          - man-db
          - meson
          - mkinitcpio
          - mpc
          - mpd
          - mpv
          - ncdu
          - ncmpcpp
          - net-tools
          - newsboat
          - nfs-utils
          - niri
          - ninja
          - nmap
          - nodejs
          - noto-fonts
          - noto-fonts-emoji
          - npm
          - opendoas
          - openresolv
          - opensc
          - opus-tools
          - pandoc-bin
          - papirus-icon-theme
          - parted
          - pass
          - pinentry
          - pipewire
          - pipewire-alsa
          - pipewire-pulse
          - playerctl
          - plocate
          - presenterm
          - pydf
          - python-adblock
          - python-html2text
          - python-netaddr
          - python-pipx
          - python-tldextract
          - python-weasyprint
          - qrencode
          - qt5-wayland
          - qt6-wayland
          - qutebrowser
          - rclone
          - rofi
          - rofi-calc
          - rsync
          - satty
          - slurp
          - smartmontools
          - socat
          - spdlog
          - swaybg
          - swayimg
          - syncthing
          - tcpdump
          - tealdeer
          - tk
          - tmux
          - traceroute
          - transmission-cli
          - tree
          - typst
          - unzip
          - urlscan
          - vim
          - wayland-protocols
          - wf-recorder
          - wget
          - whois
          - wireguard-tools
          - wiremix
          - wireplumber
          - wl-clipboard
          - xdg-desktop-portal
          - xdg-desktop-portal-hyprland
          - w3m
          - yt-dlp
          - yubikey-manager
          - zathura
          - zathura-pdf-mupdf
          - zbar
        state: present

    - name: Install Chaotic AUR pacakges
      pacman:
        name:
          - abook
          - brave-bin
          - chromium-widevine
          - downgrade
          - espanso-wayland-git
          - evremap-git
          - chaotic-aur/librewolf
          - localsend
          - noctalia-shell
        state: present

    - name: add wheel perms to build aur packs without pass prompt
      lineinfile:
        path: /etc/sudoers
        line: "%wheel ALL=(ALL) NOPASSWD: ALL"
        create: yes

    - name: clone yay
      become: false
      ansible.builtin.git:
        repo: "https://aur.archlinux.org/yay.git"
        dest: "/home/chris/dl/git-clones/yay"
        update: no

    - name: Install yay
      become: false
      shell: makepkg --noconfirm -si
      args:
        chdir: /home/chris/dl/git-clones/yay/
        creates: /usr/bin/yay

    - name: Copy skel bashrc to root
      copy:
        src: /etc/skel/.bashrc
        dest: /root/.bashrc
        remote_src: yes
        force: no

    - name: Set EDITOR and VISUAL for root
      lineinfile:
        path: /root/.bashrc
        line: "{{ item }}"
      loop:
        - "export EDITOR=nvim"
        - "export VISUAL=nvim"

    - name: Set user crontab
      become: false
      cron:
        name: "{{ item.name }}"
        special_time: "{{ item.special_time | default(omit) }}"
        minute: "{{ item.minute | default(omit) }}"
        job: "{{ item.job }}"
      loop:
        - name: battery sound
          minute: "*/10"
          job: "/home/chris/.local/bin/laptop-battery-sound.sh"
        - name: bluetooth check
          minute: "*/5"
          job: "/home/chris/.local/bin/laptop-ifblue"
        - name: atuin rclone sync
          special_time: daily
          job: "flock -n /tmp/atuin.lock /usr/bin/rclone sync --s3-upload-cutoff=0 --transfers 20 --retries 5 /home/chris/.local/share/atuin IdriveEncrypt:atuin-arch"
        - name: zoxide rclone sync
          special_time: daily
          job: "flock -n /tmp/zoxide.lock /usr/bin/rclone sync --s3-upload-cutoff=0 --transfers 20 --retries 5 /home/chris/.local/share/zoxide IdriveEncrypt:zoxide-arch"
        - name: newsboat reload
          special_time: daily
          job: "/usr/bin/newsboat -x reload"

    # ---------- AUR ----------
    - name: Install AUR pacakges
      become: false
      kewlfft.aur.aur:
        use: yay
        state: present
        name:
          - dotool-git
          - opustags
          - sc-im
          - task-spooler

    - name: Remove wheel nopasswd
      lineinfile:
        path: /etc/sudoers
        line: "%wheel ALL=(ALL) NOPASSWD: ALL"
        state: absent
        validate: "visudo -cf %s"

    # ---------- CLEANUP ----------
    - name: Remove unwanted home directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /home/chris/.vim

    - name: Create required directories
      become: false
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /home/chris/dl
        - /home/chris/dl/git-clones
        - /home/chris/.local
        - /home/chris/.local/share/repos

    - name: Remove unwanted dotfiles
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /home/chris/.bashrc
        - /home/chris/.bash_history
        - /home/chris/.bash_logout
        - /home/chris/.bash_profile
        - /home/chris/.profile
        - /home/chris/.zshenv
        - /home/chris/.wget-hsts
        - /home/chris/.viminfo

    - name: clone pia manual connections
      become: false
      ansible.builtin.git:
        repo: "https://github.com/pia-foss/manual-connections.git"
        dest: "/home/chris/dl/git-clones/manual-connections/"
        update: no

    - name: Move .gnupg to XDG location
      become: false
      ansible.builtin.command:
        cmd: mv /home/chris/.gnupg /home/chris/.local/share/gnupg
      args:
        removes: /home/chris/.gnupg
        creates: /home/chris/.local/share/gnupg

    - name: Move .ansible to XDG location
      become: false
      ansible.builtin.command:
        cmd: mv /home/chris/.ansible /home/chris/.config/ansible
      args:
        removes: /home/chris/.ansible
        creates: /home/chris/.config/ansible

    - name: Move .cargo to XDG location
      become: false
      ansible.builtin.command:
        cmd: mv /home/chris/.cargo /home/chris/.local/share/cargo
      args:
        removes: /home/chris/.cargo
        creates: /home/chris/.local/share/cargo

    - name: Move .rustup to XDG location
      become: false
      ansible.builtin.command:
        cmd: mv /home/chris/.rustup /home/chris/.local/share/rustup
      args:
        removes: /home/chris/.rustup
        creates: /home/chris/.local/share/rustup

    - name: Move go dir to XDG location
      become: false
      ansible.builtin.command:
        cmd: mv /home/chris/go /home/chris/.local/share/go
      args:
        removes: /home/chris/go
        creates: /home/chris/.local/share/go

    # ---------- CORE REPOS ----------
    - name: Define core repos
      become: false
      ansible.builtin.set_fact:
        core_repos:
          - name: cmpi66
            path: "/home/chris/.local/share/repos/cmpi66"
            clone_url: "https://github.com/cmpi66/cmpi66.git"
            primary_ssh: "git@github.com:cmpi66/cmpi66.git"
            secondary_ssh: ""

          - name: devpod-devcontainer
            path: "/home/chris/.local/share/repos/devpod-devcontainer"
            clone_url: "https://github.com/cmpi66/devpod-devcontainer.git"
            primary_ssh: "git@github.com:cmpi66/devpod-devcontainer.git"
            secondary_ssh: ""

          - name: netlify
            path: "/home/chris/.local/share/repos/netlify"
            clone_url: "https://github.com/cmpi66/netlify.git"
            primary_ssh: "git@gitlab.com:chris-m/netlify.git"
            secondary_ssh: "git@github.com:cmpi66/netlify.git"

          - name: portfolio
            path: "/home/chris/.local/share/repos/portfolio"
            clone_url: "https://github.com/cmpi66/portfolio.git"
            primary_ssh: "git@gitlab.com:chris-m/portfolio.git"
            secondary_ssh: "git@github.com:cmpi66/portfolio.git"

    - name: Clone core repos via HTTPS
      become: false
      ansible.builtin.git:
        repo: "{{ item.clone_url }}"
        dest: "{{ item.path }}"
        update: false
      loop: "{{ core_repos }}"

    - name: Get current origin URL
      become: false
      ansible.builtin.command:
        argv:
          - git
          - remote
          - get-url
          - origin
      args:
        chdir: "{{ item.path }}"
      register: origin_urls
      changed_when: false
      failed_when: false
      loop: "{{ core_repos }}"

    - name: Set origin to primary SSH URL
      become: false
      ansible.builtin.command:
        argv:
          - git
          - remote
          - set-url
          - origin
          - "{{ item.item.primary_ssh }}"
      args:
        chdir: "{{ item.item.path }}"
      when: item.stdout != item.item.primary_ssh
      loop: "{{ origin_urls.results }}"

    - name: Get current push URLs
      become: false
      ansible.builtin.command:
        argv:
          - git
          - remote
          - get-url
          - --push
          - --all
          - origin
      args:
        chdir: "{{ item.path }}"
      register: push_urls
      changed_when: false
      failed_when: false
      loop: "{{ core_repos }}"

    - name: Set primary push URL for mirrored repos
      become: false
      ansible.builtin.command:
        argv:
          - git
          - remote
          - set-url
          - --push
          - origin
          - "{{ item.item.primary_ssh }}"
      args:
        chdir: "{{ item.item.path }}"
      when:
        - item.item.secondary_ssh != ""
        - item.item.primary_ssh not in item.stdout_lines
      loop: "{{ push_urls.results }}"

    - name: Refresh push URLs after setting primary push URL
      become: false
      ansible.builtin.command:
        argv:
          - git
          - remote
          - get-url
          - --push
          - --all
          - origin
      args:
        chdir: "{{ item.path }}"
      register: push_urls_after_primary
      changed_when: false
      failed_when: false
      loop: "{{ core_repos }}"

    - name: Add secondary push URL for mirrored repos
      become: false
      ansible.builtin.command:
        argv:
          - git
          - remote
          - set-url
          - --add
          - --push
          - origin
          - "{{ item.item.secondary_ssh }}"
      args:
        chdir: "{{ item.item.path }}"
      when:
        - item.item.secondary_ssh != ""
        - item.item.secondary_ssh not in item.stdout_lines
      loop: "{{ push_urls_after_primary.results }}"
