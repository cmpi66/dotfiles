- name: Machine setup
  hosts: localhost
  become: true
  connection: local
  gather_facts: true

  pre_tasks:
    # ---------- PACMAN / KEYRING BOOTSTRAP ----------
    - name: Ensure Artix + Arch keyring packages are installed
      pacman:
        name:
          - artix-keyring
          - artix-archlinux-support
        state: present

    - name: Ensure [extra] repo block exists
      blockinfile:
        path: /etc/pacman.conf
        marker: "# {mark} ANSIBLE MANAGED EXTRA REPO"
        block: |
          [extra]
          Include = /etc/pacman.d/mirrorlist-arch

    - name: Check if pacman keyring is initialized
      stat:
        path: /etc/pacman.d/gnupg/pubring.kbx
      register: keyring_initialized

    - name: Initialize pacman keyring (first-time only)
      command: pacman-key --init
      when: not keyring_initialized.stat.exists

    - name: Sync pacman database
      command: pacman -Sy --noconfirm
      changed_when: false

    - name: Populate Artix keyring
      command: pacman-key --populate artix
      when: not keyring_initialized.stat.exists

    - name: Populate Arch keyring
      command: pacman-key --populate archlinux
      when: not keyring_initialized.stat.exists

  tasks:
    - name: Get my user
      become: false
      ansible.builtin.set_fact:
        remote_regular_user: "{{ ansible_env.SUDO_USER or ansible_user_id }}"

    - name: Change shell to zsh
      ansible.builtin.user:
        name: "{{ remote_regular_user }}"
        shell: /usr/bin/zsh

    - name: source zdotdir system wide
      lineinfile:
        path: /etc/zsh/zshenv
        line: 'export ZDOTDIR=$HOME/.config/zsh'
        create: yes

    - name: Doas conf
      lineinfile:
        path: /etc/doas.conf
        line: 'permit nopass :wheel'
        create: yes

    - name: Full system upgrade
      pacman:
        update_cache: true
        upgrade: yes

    - name: Install packages
      pacman:
        name:
          - 7zip
          - arch-wiki-docs
          - argyllcms
          - artix-archlinux-support
          - anki
          - atuin
          - bat
          - bind
          - bluez
          - bluez-openrc
          - bluez-utils
          - brightnessctl
          - btop
          - chafa
          - cliphist
          - cmake
          - ctags
          - curl
          - dmidecode
          - dosfstools
          - entr
          - eza
          - fd
          - ffmpeg
          - foot
          - foot-terminfo
          - fuse3
          - fzf
          - gammastep
          - gimp
          - gimp-plugin-gmic
          - gnome-keyring
          - go
          - grim
          - hypridle
          - hyprland
          - hyprlock
          - hyprpaper
          - hyprpicker
          - hyprshot
          - jq
          - jre17-openjdk
          - kguiaddons
          - kitty
          - kwayland5
          - libappindicator
          - libdbusmenu-glib
          - libdbusmenu-gtk3
          - linux-zen
          - linux-zen-headers
          - lshw
          - lsof
          - lynx
          - mako
          - man-db
          - meson
          - mkinitcpio
          - mpc
          - mpd
          - mpv
          - ncdu
          - ncmpcpp
          - net-tools
          - newsboat
          - nfs-utils
          - niri
          - ninja
          - nmap
          - nodejs
          - noto-fonts
          - noto-fonts-emoji
          - npm
          - opendoas
          - openresolv
          - opensc
          - opus-tools
          - pandoc-bin
          - papirus-icon-theme
          - parted
          - pinentry
          - pipewire
          - pipewire-alsa
          - pipewire-pulse
          - playerctl
          - plocate
          - presenterm
          - pydf
          - python-adblock
          - python-html2text
          - python-netaddr
          - python-pipx
          - python-tldextract
          - python-weasyprint
          - qrencode
          - qt5-wayland
          - qt6-wayland
          - qutebrowser
          - rclone
          - ripgrep
          - rofi
          - rofi-calc
          - rsync
          - satty
          - slurp
          - smartmontools
          - socat
          - spdlog
          - starship
          - swaybg
          - swayimg
          - syncthing
          - tcpdump
          - tealdeer
          - tk
          - tmux
          - traceroute
          - tree-sitter-cli
          - transmission-cli
          - typst
          - unzip
          - urlscan
          - vim
          - wayland-protocols
          - wf-recorder
          - wget
          - whois
          - wireguard-tools
          - wiremix
          - wireplumber
          - wl-clipboard
          - xdg-desktop-portal
          - xdg-desktop-portal-hyprland
          - yazi
          - yt-dlp
          - yubikey-manager
          - zathura
          - zathura-pdf-mupdf
          - zbar
          - zoxide
        state: present

    - name: add wheel perms to build aur packs without pass prompt
      lineinfile:
        path: /etc/sudoers
        line: '%wheel ALL=(ALL) NOPASSWD: ALL'
        create: yes

    - name: clone yay
      become: false
      ansible.builtin.git:
        repo: 'https://aur.archlinux.org/yay.git'
        dest: "/home/chris/dl/git-clones/yay"
        update: no

    - name: Install yay
      become: false
      shell: makepkg --noconfirm -si
      args:
        chdir: /home/chris/dl/git-clones/yay/
        creates: /usr/bin/yay

    - name: clone tpm
      become: false
      ansible.builtin.git:
        repo: 'https://github.com/tmux-plugins/tpm'
        dest: "/home/chris/.config/tmux/plugins/tpm"
        update: no

    - name: Copy skel bashrc to root
      copy:
        src: /etc/skel/.bashrc
        dest: /root/.bashrc
        remote_src: yes
        force: no

    - name: Set EDITOR and VISUAL for root
      lineinfile:
        path: /root/.bashrc
        line: "{{ item }}"
      loop:
        - 'export EDITOR=nvim'
        - 'export VISUAL=nvim'

    - name: Set user crontab
      become: false
      cron:
        name: "{{ item.name }}"
        special_time: "{{ item.special_time | default(omit) }}"
        minute: "{{ item.minute | default(omit) }}"
        job: "{{ item.job }}"
      loop:
        - name: battery sound
          minute: "*/10"
          job: "/home/chris/.local/bin/laptop-battery-sound.sh"
        - name: bluetooth check
          minute: "*/5"
          job: "/home/chris/.local/bin/laptop-ifblue"
        - name: atuin rclone sync
          special_time: daily
          job: "flock -n /tmp/atuin.lock /usr/bin/rclone sync --s3-upload-cutoff=0 --transfers 20 --retries 5 /home/chris/.local/share/atuin IdriveEncrypt:atuin-arch"
        - name: zoxide rclone sync
          special_time: daily
          job: "flock -n /tmp/zoxide.lock /usr/bin/rclone sync --s3-upload-cutoff=0 --transfers 20 --retries 5 /home/chris/.local/share/zoxide IdriveEncrypt:zoxide-arch"
        - name: newsboat reload
          special_time: daily
          job: "/usr/bin/newsboat -x reload"

    # ---------- NEOVIM ----------
    - name: Check if nvim exists
      stat:
        path: /usr/local/bin/nvim
      register: nvim_installed

    - name: clone neovim
      become: false
      ansible.builtin.git:
        repo: 'https://github.com/neovim/neovim.git'
        dest: "/home/chris/dl/git-clones/neovim"
        update: no
      when: not nvim_installed.stat.exists

    - name: Build neovim
      become: false
      shell: |
        git checkout release-0.11
        make CMAKE_BUILD_TYPE=RelWithDebInfo -j$(nproc)
      args:
        chdir: /home/chris/dl/git-clones/neovim/
      when: not nvim_installed.stat.exists

    - name: Install neovim
      shell: make install
      args:
        chdir: /home/chris/dl/git-clones/neovim/
      when: not nvim_installed.stat.exists

    # ---------- AUR ----------
    - name: Install AUR pacakges
      become: false
      kewlfft.aur.aur:
        use: yay
        state: present
        name:
          - abook
          - brave-bin
          - chromium-widevine
          - dotool-git
          - downgrade
          - espanso-wayland
          - evremap-git
          - librewolf-bin
          - localsend
          - mutt-wizard-git
          - noctalia-shell
          - opustags
          - sc-im
          - task-spooler

    - name: Remove wheel nopasswd
      lineinfile:
        path: /etc/sudoers
        line: '%wheel ALL=(ALL) NOPASSWD: ALL'
        state: absent
        validate: 'visudo -cf %s'

# ---------- CLEANUP ----------
    - name: Remove unwanted home directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /home/chris/.vim

    - name: Create required directories
      become: false
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /home/chris/dl
        - /home/chris/dl/git-clones
        - /home/chris/.local

    - name: Remove unwanted dotfiles
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /home/chris/.bashrc
        - /home/chris/.bash_history
        - /home/chris/.bash_logout
        - /home/chris/.bash_profile
        - /home/chris/.profile
        - /home/chris/.zshenv
        - /home/chris/.wget-hsts
        - /home/chris/.viminfo

    - name: Move .gnupg to XDG location
      become: false
      ansible.builtin.command:
        cmd: mv /home/chris/.gnupg /home/chris/.local/share/gnupg
      args:
        removes: /home/chris/.gnupg
        creates: /home/chris/.local/share/gnupg

    - name: Move .ansible to XDG location
      become: false
      ansible.builtin.command:
        cmd: mv /home/chris/.ansible /home/chris/.config/ansible
      args:
        removes: /home/chris/.ansible
        creates: /home/chris/.config/ansible

    - name: Move .cargo to XDG location
      become: false
      ansible.builtin.command:
        cmd: mv /home/chris/.cargo /home/chris/.local/share/cargo
      args:
        removes: /home/chris/.cargo
        creates: /home/chris/.local/share/cargo

    - name: Move .rustup to XDG location
      become: false
      ansible.builtin.command:
        cmd: mv /home/chris/.rustup /home/chris/.local/share/rustup
      args:
        removes: /home/chris/.rustup
        creates: /home/chris/.local/share/rustup

    - name: Move go dir to XDG location
      become: false
      ansible.builtin.command:
        cmd: mv /home/chris/go /home/chris/.local/share/go
      args:
        removes: /home/chris/go
        creates: /home/chris/.local/share/go
