---
- name: Machine setup
  hosts: localhost
  become: true
  connection: local
  gather_facts: true
  pre_tasks:
  - name: Update pacman
    become: true
    pacman:
      update_cache: true
      upgrade: yes


  tasks:
    - name: Get my user
      become: false
      ansible.builtin.set_fact:
        remote_regular_user: "{{ ansible_env.SUDO_USER or ansible_user_id }}"

    - name: Install archlinux repos
      shell: ./archkeys_setup.sh

    - name: Change shell to zsh
      ansible.builtin.user:
        name: "{{ remote_regular_user }}"
        shell: /usr/bin/zsh

    - name: source zdotdir system wide
      lineinfile:
        path: /etc/zsh/zshenv
        line: 'export ZDOTDIR=$HOME/.config/zsh'
        create: yes

    - name: Doas conf
      lineinfile:
        path: /etc/doas.conf
        line: 'permit nopass :wheel'
        create: yes

    - name: Install packages
      pacman:
        name:
          - 7zip
          - arch-wiki-docs
          - argyllcms
          - artix-archlinux-support
          - atuin
          - bat
          - bind
          - bluez
          - bluez-openrc
          - bluez-utils
          - brightnessctl
          - btop
          - chafa
          - chezmoi
          - cliphist
          - cmake
          - ctags
          - curl
          - dmidecode
          - dosfstools
          - entr
          - eza
          - fd
          - ffmpeg
          - foot
          - foot-terminfo
          - fuse3
          - fzf
          - gammastep
          - gimp
          - gimp-plugin-gmic
          - gnome-keyring
          - go
          - grim
          - hypridle
          - hyprland
          - hyprlock
          - hyprpaper
          - hyprpicker
          - hyprshot
          - jq
          - jre17-openjdk
          - kguiaddons
          - kitty
          - kwayland5
          - libappindicator
          - libdbusmenu-glib
          - libdbusmenu-gtk3
          - linux-zen
          - linux-zen-headers
          - lshw
          - lsof
          - lua
          - lynx
          - mako
          - man-db
          - meson
          - mkinitcpio
          - mpc
          - mpd
          - mpv
          - ncdu
          - ncmpcpp
          - net-tools
          - newsboat
          - nfs-utils
          - niri
          - ninja
          - nmap
          - nodejs
          - noto-fonts
          - noto-fonts-emoji
          - npm
          - opendoas
          - openresolv
          - opensc
          - opus-tools
          - pandoc-bin
          - papirus-icon-theme
          - parted
          - pinentry
          - pipewire
          - pipewire-alsa
          - pipewire-pulse
          - playerctl
          - plocate
          - presenterm
          - pydf
          - python-adblock
          - python-html2text
          - python-netaddr
          - python-pipx
          - python-tldextract
          - python-weasyprint
          - qrencode
          - qt5-wayland
          - qt6-wayland
          - qutebrowser
          - rclone
          - ripgrep
          - rofi
          - rofi-calc
          - rsync
          - satty
          - slurp
          - smartmontools
          - socat
          - spdlog
          - starship
          - swaybg
          - swayimg
          - syncthing
          - tcpdump
          - tealdeer
          - tk
          - tmux
          - traceroute
          - transmission-cli
          - typst
          - unzip
          - urlscan
          - vim
          - wayland-protocols
          - wf-recorder
          - wget
          - whois
          - wireguard-tools
          - wiremix
          - wireplumber
          - wl-clipboard
          - xdg-desktop-portal
          - xdg-desktop-portal-hyprland
          - yazi
          - yt-dlp
          - yubikey-manager
          - zathura
          - zathura-pdf-mupdf
          - zbar
          - zoxide
        state: present


    - name: add wheel perms to build aur packs without pass prompt
      lineinfile:
        path: /etc/sudoers
        line: '%wheel ALL=(ALL) NOPASSWD: ALL'
        create: yes

    - name: clone paru
      become: false
      ansible.builtin.git:
        repo: 'https://aur.archlinux.org/paru-bin.git'
        dest: "{{ ansible_env.HOME }}/dl/git-clones/paru"

    - name: Install paru
      become: yes
      become_user: "{{ ansible_user }}"
      command:
        cmd: makepkg --noconfirm -si
        chdir: "{{ ansible_env.HOME }}/dl/git-clones/paru"
        creates: /usr/bin/paru

    - name: Copy skel bashrc to root
      copy:
        src: /etc/skel/.bashrc
        dest: /root/.bashrc
        remote_src: yes
        force: no

    - name: Set EDITOR and VISUAL for root
      lineinfile:
        path: /root/.bashrc
        line: "{{ item }}"
        create: no
      loop:
        - 'export EDITOR=nvim'
        - 'export VISUAL=nvim'

    - name: Set user crontab
      become: false
      cron:
        name: "{{ item.name }}"
        special_time: "{{ item.special_time | default(omit) }}"
        minute: "{{ item.minute | default(omit) }}"
        job: "{{ item.job }}"
      loop:
        - name: battery sound
          minute: "*/10"
          job: "{{ ansible_env.HOME }}/.local/bin/extras/laptop-battery-sound.sh"
        - name: bluetooth check
          minute: "*/5"
          job: "{{ ansible_env.HOME }}/.local/bin/extras/laptop-ifblue"
        - name: atuin rclone sync
          special_time: daily
          job: "flock -n /tmp/atuin.lock /usr/bin/rclone sync --s3-upload-cutoff=0 --transfers 20 --retries 5 {{ ansible_env.HOME }}/.local/share/atuin IdriveEncrypt:atuin-arch"
        - name: newsboat reload
          special_time: daily
          job: "/usr/bin/newsboat -x reload"

    - name: Install AUR pacakges
      become: false
      shell: ./paruapps

    - name: Remove wheel nopasswd
      lineinfile:
        path: /etc/sudoers
        line: '%wheel ALL=(ALL) NOPASSWD: ALL'
        state: absent
        validate: 'visudo -cf %s'

