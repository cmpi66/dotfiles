---
- name: Machine setup
  hosts: localhost
  become: true
  connection: local
  gather_facts: true

  tasks:
    - name: Get my user
      become: false
      ansible.builtin.set_fact:
        remote_regular_user: "{{ ansible_env.SUDO_USER or ansible_user_id }}"

    - name: Change shell to zsh
      ansible.builtin.user:
        name: "{{ remote_regular_user }}"
        shell: /usr/bin/zsh

    - name: source zdotdir system wide
      lineinfile:
        path: /etc/zsh/zshenv
        line: 'export ZDOTDIR=$HOME/.config/zsh'
        create: yes

    - name: Doas conf
      lineinfile:
        path: /etc/doas.conf
        line: 'permit nopass :wheel'
        create: yes

    - name: Copy skel bashrc to root
      copy:
        src: /etc/skel/.bashrc
        dest: /root/.bashrc
        remote_src: yes
        force: no

    - name: Set EDITOR and VISUAL for root
      lineinfile:
        path: /root/.bashrc
        line: "{{ item }}"
      loop:
        - 'export EDITOR=nvim'
        - 'export VISUAL=nvim'

    - name: Set Aliases for root
      lineinfile:
        path: /root/.bashrc
        line: "{{ item }}"
      loop:
        - 'alias makekern="make -j32 && make -j32 modules_install && make install"'
        - 'alias ls="eza -al --color=always --icons --group-directories-first"'
        - 'alias ss="eza -al --color=always --icons --group-directories-first"'

    # ---------- EVREMAP ----------
    - name: Check if evremap exists
      stat:
        path: /usr/local/bin/evremap
      register: evremap_installed

    - name: clone evremap
      become: false
      ansible.builtin.git:
        repo: 'https://github.com/wez/evremap.git'
        dest: "/home/chris/dl/git-clones/evremap"
        update: no
      when: not evremap_installed.stat.exists

    - name: Build evremap
      become: false
      shell: cargo build --release
      args:
        chdir: /home/chris/dl/git-clones/evremap/
      when: not evremap_installed.stat.exists

    - name: Install evremap
      copy:
        src: /home/chris/dl/git-clones/evremap/target/release/evremap
        dest: /usr/local/bin/evremap
        mode: '0755'
        remote_src: true
      when: not evremap_installed.stat.exists

    # ---------- TPM ----------
    - name: clone tpm
      become: false
      ansible.builtin.git:
        repo: 'https://github.com/tmux-plugins/tpm'
        dest: "/home/chris/.config/tmux/plugins/tpm"
        update: no

    # ---------- CRON ----------
    - name: Set user crontab
      become: false
      cron:
        name: "{{ item.name }}"
        special_time: "{{ item.special_time | default(omit) }}"
        minute: "{{ item.minute | default(omit) }}"
        job: "{{ item.job }}"
      loop:
        - name: cloneback
          special_time: daily
          job: "/home/chris/.local/bin/cloneback"
        - name: atuin rclone sync
          special_time: daily
          job: "flock -n /tmp/atuin.lock /usr/bin/rclone sync --s3-upload-cutoff=0 --transfers 20 --retries 5 /home/chris/.local/share/atuin IdriveEncrypt:atuin-gentoo"
        - name: newsboat reload
          special_time: daily
          job: "/usr/bin/newsboat -x reload"

    # ---------- NEOVIM ----------
    - name: Check if nvim exists
      stat:
        path: /usr/local/bin/nvim
      register: nvim_installed

    - name: clone neovim
      become: false
      ansible.builtin.git:
        repo: 'https://github.com/neovim/neovim.git'
        dest: "/home/chris/dl/git-clones/neovim"
        update: no
      when: not nvim_installed.stat.exists

    - name: Build neovim
      become: false
      shell: |
        git checkout release-0.11
        make CMAKE_BUILD_TYPE=RelWithDebInfo -j$(nproc)
      args:
        chdir: /home/chris/dl/git-clones/neovim/
      when: not nvim_installed.stat.exists

    - name: Install neovim
      shell: make install
      args:
        chdir: /home/chris/dl/git-clones/neovim/
      when: not nvim_installed.stat.exists

    # ---------- CLEANUP ----------
    - name: Final cleanup
      become: false
      shell: ./cleanup
      args:
        chdir: "{{ playbook_dir }}"
