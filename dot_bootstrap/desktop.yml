---
- name: Machine setup
  hosts: localhost
  become: true
  connection: local
  gather_facts: true

  tasks:
    - name: Get my user
      become: false
      ansible.builtin.set_fact:
        remote_regular_user: "{{ ansible_env.SUDO_USER or ansible_user_id }}"

    - name: Change shell to zsh
      ansible.builtin.user:
        name: "{{ remote_regular_user }}"
        shell: /bin/zsh # different path on gentoo, a great way to lock yourself out and also mess up SSH

    - name: source zdotdir system wide
      lineinfile:
        path: /etc/zsh/zshenv
        line: 'export ZDOTDIR=$HOME/.config/zsh'
        create: yes

    - name: Doas conf
      lineinfile:
        path: /etc/doas.conf
        line: 'permit nopass :wheel'
        create: yes

    - name: Copy skel bashrc to root
      copy:
        src: /etc/skel/.bashrc
        dest: /root/.bashrc
        remote_src: yes
        force: no

    - name: Set EDITOR and VISUAL for root
      lineinfile:
        path: /root/.bashrc
        line: "{{ item }}"
      loop:
        - 'export EDITOR=nvim'
        - 'export VISUAL=nvim'

    - name: Set Aliases for root
      lineinfile:
        path: /root/.bashrc
        line: "{{ item }}"
      loop:
        - 'alias makekern="make -j32 && make -j32 modules_install && make install"'
        - 'alias ls="eza -al --color=always --icons --group-directories-first"'
        - 'alias ss="eza -al --color=always --icons --group-directories-first"'

    # ---------- EVREMAP ----------
    - name: Check if evremap exists
      stat:
        path: /usr/local/bin/evremap
      register: evremap_installed

    - name: clone evremap
      become: false
      ansible.builtin.git:
        repo: 'https://github.com/wez/evremap.git'
        dest: "/home/chris/dl/git-clones/evremap"
        update: no
      when: not evremap_installed.stat.exists

    - name: Build evremap
      become: false
      shell: cargo build --release
      args:
        chdir: /home/chris/dl/git-clones/evremap/
      when: not evremap_installed.stat.exists

    - name: Install evremap
      copy:
        src: /home/chris/dl/git-clones/evremap/target/release/evremap
        dest: /usr/local/bin/evremap
        mode: '0755'
        remote_src: true
      when: not evremap_installed.stat.exists

    # ---------- CRON ----------
    - name: Set user crontab
      become: false
      cron:
        name: "{{ item.name }}"
        special_time: "{{ item.special_time | default(omit) }}"
        minute: "{{ item.minute | default(omit) }}"
        job: "{{ item.job }}"
      loop:
        - name: cloneback
          special_time: daily
          job: "/home/chris/.local/bin/cloneback"
        - name: atuin rclone sync
          special_time: daily
          job: "flock -n /tmp/atuin.lock /usr/bin/rclone sync --s3-upload-cutoff=0 --transfers 20 --retries 5 /home/chris/.local/share/atuin IdriveEncrypt:atuin-gentoo"
        - name: zoxide rclone sync
          special_time: daily
          job: "flock -n /tmp/zoxide.lock /usr/bin/rclone sync --s3-upload-cutoff=0 --transfers 20 --retries 5 /home/chris/.local/share/zoxide IdriveEncrypt:zoxide-gentoo"
        - name: newsboat reload
          special_time: daily
          job: "/usr/bin/newsboat -x reload"

# ---------- CLEANUP ----------
    - name: Remove unwanted home directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /home/chris/.vim

    - name: Create required directories
      become: false
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /home/chris/dl
        - /home/chris/dl/git-clones
        - /home/chris/.local
        - /home/chris/.local/share/repos

    - name: Remove unwanted dotfiles
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /home/chris/.bashrc
        - /home/chris/.bash_history
        - /home/chris/.bash_logout
        - /home/chris/.bash_profile
        - /home/chris/.profile
        - /home/chris/.zshenv
        - /home/chris/.wget-hsts
        - /home/chris/.viminfo

    - name: clone pia manual connections
      become: false
      ansible.builtin.git:
        repo: 'https://github.com/pia-foss/manual-connections.git'
        dest: "/home/chris/dl/git-clones/manual-connections/"
        update: no

    - name: Move .gnupg to XDG location
      become: false
      ansible.builtin.command:
        cmd: mv /home/chris/.gnupg /home/chris/.local/share/gnupg
      args:
        removes: /home/chris/.gnupg
        creates: /home/chris/.local/share/gnupg

    - name: Move .ansible to XDG location
      become: false
      ansible.builtin.command:
        cmd: mv /home/chris/.ansible /home/chris/.config/ansible
      args:
        removes: /home/chris/.ansible
        creates: /home/chris/.config/ansible

    - name: Move .cargo to XDG location
      become: false
      ansible.builtin.command:
        cmd: mv /home/chris/.cargo /home/chris/.local/share/cargo
      args:
        removes: /home/chris/.cargo
        creates: /home/chris/.local/share/cargo

    - name: Move .rustup to XDG location
      become: false
      ansible.builtin.command:
        cmd: mv /home/chris/.rustup /home/chris/.local/share/rustup
      args:
        removes: /home/chris/.rustup
        creates: /home/chris/.local/share/rustup

    - name: Move go dir to XDG location
      become: false
      ansible.builtin.command:
        cmd: mv /home/chris/go /home/chris/.local/share/go
      args:
        removes: /home/chris/go
        creates: /home/chris/.local/share/go

    # ---------- CORE REPOS ----------
    - name: Define core repos
      become: false
      ansible.builtin.set_fact:
        core_repos:
          - name: cmpi66
            path: "/home/chris/.local/share/repos/cmpi66"
            clone_url: "https://github.com/cmpi66/cmpi66.git"
            primary_ssh: "git@github.com:cmpi66/cmpi66.git"
            secondary_ssh: ""

          - name: devpod-devcontainer
            path: "/home/chris/.local/share/repos/devpod-devcontainer"
            clone_url: "https://github.com/cmpi66/devpod-devcontainer.git"
            primary_ssh: "git@github.com:cmpi66/devpod-devcontainer.git"
            secondary_ssh: ""

          - name: gentoo
            path: "/home/chris/.local/share/repos/gentoo"
            clone_url: "https://github.com/cmpi66/gentoo.git"
            primary_ssh: "git@github.com:cmpi66/gentoo.git"
            secondary_ssh: ""

          - name: netlify
            path: "/home/chris/.local/share/repos/netlify"
            clone_url: "https://github.com/cmpi66/netlify.git"
            primary_ssh: "git@gitlab.com:chris-m/netlify.git"
            secondary_ssh: "git@github.com:cmpi66/netlify.git"

          - name: portfolio
            path: "/home/chris/.local/share/repos/portfolio"
            clone_url: "https://github.com/cmpi66/portfolio.git"
            primary_ssh: "git@gitlab.com:chris-m/portfolio.git"
            secondary_ssh: "git@github.com:cmpi66/portfolio.git"

    - name: Clone core repos via HTTPS
      become: false
      ansible.builtin.git:
        repo: "{{ item.clone_url }}"
        dest: "{{ item.path }}"
        update: false
      loop: "{{ core_repos }}"

    - name: Get current origin URL
      become: false
      ansible.builtin.command:
        argv:
          - git
          - remote
          - get-url
          - origin
      args:
        chdir: "{{ item.path }}"
      register: origin_urls
      changed_when: false
      failed_when: false
      loop: "{{ core_repos }}"

    - name: Set origin to primary SSH URL
      become: false
      ansible.builtin.command:
        argv:
          - git
          - remote
          - set-url
          - origin
          - "{{ item.item.primary_ssh }}"
      args:
        chdir: "{{ item.item.path }}"
      when: item.stdout != item.item.primary_ssh
      loop: "{{ origin_urls.results }}"

    - name: Get current push URLs
      become: false
      ansible.builtin.command:
        argv:
          - git
          - remote
          - get-url
          - --push
          - --all
          - origin
      args:
        chdir: "{{ item.path }}"
      register: push_urls
      changed_when: false
      failed_when: false
      loop: "{{ core_repos }}"

    - name: Set primary push URL for mirrored repos
      become: false
      ansible.builtin.command:
        argv:
          - git
          - remote
          - set-url
          - --push
          - origin
          - "{{ item.item.primary_ssh }}"
      args:
        chdir: "{{ item.item.path }}"
      when:
        - item.item.secondary_ssh != ""
        - item.item.primary_ssh not in item.stdout_lines
      loop: "{{ push_urls.results }}"

    - name: Refresh push URLs after setting primary push URL
      become: false
      ansible.builtin.command:
        argv:
          - git
          - remote
          - get-url
          - --push
          - --all
          - origin
      args:
        chdir: "{{ item.path }}"
      register: push_urls_after_primary
      changed_when: false
      failed_when: false
      loop: "{{ core_repos }}"

    - name: Add secondary push URL for mirrored repos
      become: false
      ansible.builtin.command:
        argv:
          - git
          - remote
          - set-url
          - --add
          - --push
          - origin
          - "{{ item.item.secondary_ssh }}"
      args:
        chdir: "{{ item.item.path }}"
      when:
        - item.item.secondary_ssh != ""
        - item.item.secondary_ssh not in item.stdout_lines
      loop: "{{ push_urls_after_primary.results }}"
